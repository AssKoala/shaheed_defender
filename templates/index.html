<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shaheed Defender</title>
    <style>
      :root {
        --bg: #040814;
        --panel: #0b1328;
        --text: #d7e7ff;
        --accent: #78c8ff;
        --danger: #ff7a6a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: radial-gradient(circle at 20% 0%, #132449 0%, var(--bg) 42%);
        color: var(--text);
        font-family: "Consolas", "Courier New", monospace;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 16px;
      }

      .frame {
        width: min(100%, 1000px);
        background: color-mix(in oklab, var(--panel), black 10%);
        border: 1px solid #1a2d66;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
        border-radius: 12px;
        overflow: hidden;
      }

      .hud {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        padding: 10px 14px;
        border-bottom: 1px solid #17306d;
        font-size: 14px;
      }

      .hud span strong {
        color: var(--accent);
      }

      .board-wrap {
        padding: 14px;
        display: grid;
        place-items: center;
        min-height: 360px;
        background:
          linear-gradient(180deg, rgba(57, 92, 160, 0.2), rgba(6, 12, 25, 0) 36%),
          radial-gradient(circle at 56% 6%, rgba(108, 160, 233, 0.16), rgba(0, 0, 0, 0) 36%),
          #060b18;
      }

      #board {
        display: block;
        width: min(100%, 100%);
        max-height: 72vh;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        border: 1px solid #17306d;
        background: #040814;
      }

      .controls {
        padding: 8px 14px 14px;
        color: #9fb7df;
        font-size: 13px;
      }

      .status {
        color: #9cc8ff;
      }
    </style>
  </head>
  <body>
    <main class="frame">
      <section class="hud">
        <span>Score: <strong id="score">0</strong></span>
        <span>Wave: <strong id="wave">1</strong></span>
        <span>Cities: <strong id="cities">6/6</strong></span>
        <span>Ammo: <strong id="ammo">30</strong></span>
        <span class="status" id="status">Connecting...</span>
      </section>
      <section class="board-wrap">
        <canvas id="board"></canvas>
      </section>
      <section class="controls">
        Controls: Arrow keys move | Space fires | Click to target/fire | R restarts after game over
      </section>
    </main>

    <script>
      const board = document.getElementById("board");
      const ctx = board.getContext("2d");
      const statusEl = document.getElementById("status");
      const scoreEl = document.getElementById("score");
      const waveEl = document.getElementById("wave");
      const citiesEl = document.getElementById("cities");
      const ammoEl = document.getElementById("ammo");

      let lastState = null;

      const spritePaths = {
        a10: "/static/sprites/a10.png",
        battery: "/static/sprites/battery.png",
        city: "/static/sprites/city.png",
        cityDestroyed: "/static/sprites/city_destroyed.png",
        cursor: "/static/sprites/cursor.png",
        drone: "/static/sprites/drone.png",
        explosion1: "/static/sprites/explosion_1.png",
        explosion2: "/static/sprites/explosion_2.png",
        explosion3: "/static/sprites/explosion_3.png",
        explosion4: "/static/sprites/explosion_4.png",
        explosion5: "/static/sprites/explosion_5.png",
        ground: "/static/sprites/ground.png",
        missile: "/static/sprites/missile.png",
        moon: "/static/sprites/moon.png",
        tehranFar: "/static/sprites/tehran_far.png",
        tehranNear: "/static/sprites/tehran_near.png",
        star: "/static/sprites/star.png"
      };

      const sprites = {};

      function loadImage(src) {
        return new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => resolve(image);
          image.onerror = reject;
          image.src = src;
        });
      }

      async function loadSprites() {
        const entries = await Promise.all(
          Object.entries(spritePaths).map(async ([key, path]) => [key, await loadImage(path)])
        );
        for (const [key, image] of entries) {
          sprites[key] = image;
        }
      }

      function buildIsoMetrics(state) {
        const maxWidth = Math.max(540, window.innerWidth - 88);
        const maxHeight = Math.max(360, window.innerHeight - 240);
        const span = state.w + state.h;
        const tileWFromWidth = (maxWidth * 2) / (span + 9);
        const tileWFromHeight = (maxHeight * 2) / ((span + 12) * 0.56);
        const tileW = Math.max(10, Math.min(26, Math.floor(Math.min(tileWFromWidth, tileWFromHeight))));
        const tileH = Math.max(6, Math.floor(tileW * 0.56));
        const width = Math.round((span * tileW) / 2 + tileW * 10);
        const height = Math.round((span * tileH) / 2 + tileH * 16);
        const originX = tileW * 5;
        const originY = tileH * 2;
        return { tileW, tileH, width, height, originX, originY };
      }

      function resizeBoard(state) {
        const iso = buildIsoMetrics(state);
        board.width = iso.width;
        board.height = iso.height;
        board.style.width = `${iso.width}px`;
        board.style.height = `${iso.height}px`;
        ctx.imageSmoothingEnabled = false;
        return iso;
      }

      function drawSprite(sprite, x, y, width, height) {
        if (!sprite) {
          return;
        }
        ctx.drawImage(sprite, Math.round(x), Math.round(y), Math.round(width), Math.round(height));
      }

      function projectIso(worldX, worldY, iso) {
        return {
          x: iso.originX + (worldX - worldY) * (iso.tileW / 2),
          y: iso.originY + (worldX + worldY) * (iso.tileH / 2)
        };
      }

      function unprojectIso(screenX, screenY, iso) {
        const dx = (screenX - iso.originX) / (iso.tileW / 2);
        const dy = (screenY - iso.originY) / (iso.tileH / 2);
        return {
          x: (dx + dy) / 2,
          y: (dy - dx) / 2
        };
      }

      function drawBackdrop(state, iso) {
        const skyGradient = ctx.createLinearGradient(0, 0, 0, board.height);
        skyGradient.addColorStop(0, "#122548");
        skyGradient.addColorStop(0.5, "#0b1430");
        skyGradient.addColorStop(1, "#050816");
        ctx.fillStyle = skyGradient;
        ctx.fillRect(0, 0, board.width, board.height);

        drawSprite(sprites.moon, board.width * 0.72, board.height * 0.08, iso.tileW * 2.5, iso.tileW * 2.5);

        for (let y = 0; y < state.h - 4; y += 1) {
          for (let x = (y % 2) * 5; x < state.w; x += 11) {
            if ((x + y * 3) % 17 === 0) {
              drawSprite(sprites.star, x * iso.tileW * 0.9, y * iso.tileH * 0.9, iso.tileW, iso.tileW);
            }
          }
        }

        const farY = board.height - iso.tileW * 7.2;
        const nearY = board.height - iso.tileW * 6.2;
        for (let x = -iso.tileW; x < board.width + iso.tileW; x += iso.tileW * 6) {
          drawSprite(sprites.tehranFar, x, farY, iso.tileW * 6, iso.tileW * 6);
        }
        for (let x = -iso.tileW * 0.5; x < board.width + iso.tileW; x += iso.tileW * 6) {
          drawSprite(sprites.tehranNear, x, nearY, iso.tileW * 6, iso.tileW * 6);
        }

        ctx.fillStyle = "rgba(255, 198, 120, 0.08)";
        ctx.fillRect(0, board.height - iso.tileW * 3.8, board.width, iso.tileW * 1.8);
      }

      function explosionSpriteForRadius(radius) {
        if (radius <= 1) return sprites.explosion1;
        if (radius === 2) return sprites.explosion2;
        if (radius === 3) return sprites.explosion3;
        if (radius === 4) return sprites.explosion4;
        return sprites.explosion5;
      }

      function draw(state) {
        const iso = resizeBoard(state);
        drawBackdrop(state, iso);

        for (let x = 0; x < state.w; x += 1) {
          const p = projectIso(x, state.h - 1, iso);
          drawSprite(sprites.ground, p.x - iso.tileW * 0.8, p.y - iso.tileH * 0.7, iso.tileW * 1.6, iso.tileW * 1.6);
        }

        const queue = [];
        const enqueue = (depth, fn) => queue.push({ depth, fn });

        for (const city of state.cities) {
          const sprite = city.alive ? sprites.city : sprites.cityDestroyed;
          const p = projectIso(city.x, state.h - 2, iso);
          enqueue(p.y, () => drawSprite(sprite, p.x - iso.tileW * 1.45, p.y - iso.tileW * 1.95, iso.tileW * 2.9, iso.tileW * 2.9));
        }

        {
          const p = projectIso(state.battery_x, state.battery_y, iso);
          enqueue(p.y + 1, () => drawSprite(sprites.battery, p.x - iso.tileW * 1.6, p.y - iso.tileW * 1.9, iso.tileW * 3.2, iso.tileW * 3.2));
        }

        for (const d of state.drones) {
          const p = projectIso(d.x, d.y, iso);
          enqueue(p.y, () => drawSprite(sprites.drone, p.x - iso.tileW * 0.9, p.y - iso.tileW * 1.15, iso.tileW * 1.8, iso.tileW * 1.8));
        }

        for (const m of state.missiles) {
          const p = projectIso(m.x, m.y, iso);
          enqueue(p.y + 0.2, () => drawSprite(sprites.missile, p.x - iso.tileW * 0.45, p.y - iso.tileW * 1.4, iso.tileW * 0.9, iso.tileW * 1.6));
        }

        for (const a10 of state.a10s) {
          const p = projectIso(a10.x, a10.y, iso);
          enqueue(p.y - 2, () => drawSprite(sprites.a10, p.x - iso.tileW * 2.2, p.y - iso.tileW * 2.2, iso.tileW * 4.4, iso.tileW * 2.8));
        }

        for (const exp of state.explosions) {
          const p = projectIso(exp.x, exp.y, iso);
          const size = Math.max(1, exp.r * 2 + 1) * iso.tileW * 0.62;
          enqueue(p.y + 0.1, () => drawSprite(explosionSpriteForRadius(exp.r), p.x - size / 2, p.y - size / 2 - iso.tileH * 0.35, size, size));
        }

        {
          const p = projectIso(state.cursor.x, state.cursor.y, iso);
          enqueue(p.y + 4, () => drawSprite(sprites.cursor, p.x - iso.tileW * 0.7, p.y - iso.tileW * 1.2, iso.tileW * 1.4, iso.tileW * 1.4));
        }

        queue.sort((a, b) => a.depth - b.depth);
        for (const item of queue) {
          item.fn();
        }

        if (state.game_over) {
          const panelWidth = Math.min(board.width * 0.72, iso.tileW * 30);
          const panelHeight = Math.min(board.height * 0.25, iso.tileW * 6.4);
          const panelX = (board.width - panelWidth) / 2;
          const panelY = (board.height - panelHeight) / 2;
          ctx.fillStyle = "rgba(6, 8, 20, 0.85)";
          ctx.fillRect(panelX, panelY, panelWidth, panelHeight);
          ctx.strokeStyle = "#ff5c5c";
          ctx.lineWidth = Math.max(2, Math.floor(iso.tileW / 5));
          ctx.strokeRect(panelX, panelY, panelWidth, panelHeight);
          ctx.fillStyle = "#ffe5e5";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.font = `${Math.max(16, Math.floor(iso.tileW * 1.05))}px monospace`;
          ctx.fillText("GAME OVER", board.width / 2, panelY + panelHeight * 0.42);
          ctx.font = `${Math.max(12, Math.floor(iso.tileW * 0.68))}px monospace`;
          ctx.fillText("Press R to restart", board.width / 2, panelY + panelHeight * 0.72);
        }

        const alive = state.cities.filter((c) => c.alive).length;
        scoreEl.textContent = String(state.score);
        waveEl.textContent = String(state.wave);
        citiesEl.textContent = `${alive}/6`;
        ammoEl.textContent = String(state.ammo);
      }

      async function sendAction(payload) {
        await fetch("/api/action", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
      }

      async function tick() {
        try {
          const resp = await fetch("/api/state", { cache: "no-store" });
          if (!resp.ok) {
            throw new Error("State request failed");
          }
          const state = await resp.json();
          lastState = state;
          draw(state);
          statusEl.textContent = "Online";
        } catch (err) {
          statusEl.textContent = "Disconnected - retrying";
        }
      }

      window.addEventListener("keydown", async (event) => {
        if (!lastState) {
          return;
        }
        if (event.key === "ArrowUp") await sendAction({ action: "move", dx: 0, dy: -1 });
        else if (event.key === "ArrowDown") await sendAction({ action: "move", dx: 0, dy: 1 });
        else if (event.key === "ArrowLeft") await sendAction({ action: "move", dx: -2, dy: 0 });
        else if (event.key === "ArrowRight") await sendAction({ action: "move", dx: 2, dy: 0 });
        else if (event.key === " ") await sendAction({ action: "fire" });
        else if ((event.key === "r" || event.key === "R") && lastState.game_over) {
          await fetch("/api/restart", { method: "POST" });
        } else {
          return;
        }
        event.preventDefault();
        await tick();
      });

      board.addEventListener("click", async (event) => {
        if (!lastState) {
          return;
        }
        const rect = board.getBoundingClientRect();
        const iso = buildIsoMetrics(lastState);
        const sx = (event.clientX - rect.left) * (board.width / rect.width);
        const sy = (event.clientY - rect.top) * (board.height / rect.height);
        const world = unprojectIso(sx, sy, iso);
        const x = Math.max(1, Math.min(lastState.w - 2, Math.floor(world.x)));
        const y = Math.max(1, Math.min(lastState.h - 3, Math.floor(world.y)));
        await sendAction({ action: "click_fire", x, y });
        await tick();
      });

      window.addEventListener("resize", () => {
        if (lastState) {
          draw(lastState);
        }
      });

      async function start() {
        statusEl.textContent = "Loading art...";
        await loadSprites();
        await tick();
        setInterval(tick, 50);
      }

      start().catch(() => {
        statusEl.textContent = "Failed to load art";
      });
    </script>
  </body>
</html>
