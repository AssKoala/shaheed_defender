<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shaheed Defender</title>
    <style>
      :root {
        --bg: #040814;
        --panel: #0b1328;
        --text: #d7e7ff;
        --accent: #78c8ff;
        --danger: #ff7a6a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: radial-gradient(circle at 20% 0%, #132449 0%, var(--bg) 42%);
        color: var(--text);
        font-family: "Consolas", "Courier New", monospace;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 16px;
      }

      .frame {
        width: min(100%, 1000px);
        background: color-mix(in oklab, var(--panel), black 10%);
        border: 1px solid #1a2d66;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
        border-radius: 12px;
        overflow: hidden;
      }

      .hud {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        padding: 10px 14px;
        border-bottom: 1px solid #17306d;
        font-size: 14px;
      }

      .hud span strong {
        color: var(--accent);
      }

      .board-wrap {
        padding: 14px;
        display: grid;
        place-items: center;
        min-height: 360px;
        background:
          linear-gradient(180deg, rgba(57, 92, 160, 0.2), rgba(6, 12, 25, 0) 36%),
          radial-gradient(circle at 56% 6%, rgba(108, 160, 233, 0.16), rgba(0, 0, 0, 0) 36%),
          #060b18;
      }

      #board {
        display: block;
        width: min(100%, 100%);
        max-height: 72vh;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        border: 1px solid #17306d;
        background: #040814;
      }

      .controls {
        padding: 8px 14px 14px;
        color: #9fb7df;
        font-size: 13px;
      }

      .status {
        color: #9cc8ff;
      }
    </style>
  </head>
  <body>
    <main class="frame">
      <section class="hud">
        <span>Score: <strong id="score">0</strong></span>
        <span>Wave: <strong id="wave">1</strong></span>
        <span>Cities: <strong id="cities">6/6</strong></span>
        <span>Ammo: <strong id="ammo">30</strong></span>
        <span class="status" id="status">Connecting...</span>
      </section>
      <section class="board-wrap">
        <canvas id="board"></canvas>
      </section>
      <section class="controls">
        Controls: Arrow keys move | Space fires | Click to target/fire | R restarts after game over
      </section>
    </main>

    <script>
      const board = document.getElementById("board");
      const ctx = board.getContext("2d");
      const statusEl = document.getElementById("status");
      const scoreEl = document.getElementById("score");
      const waveEl = document.getElementById("wave");
      const citiesEl = document.getElementById("cities");
      const ammoEl = document.getElementById("ammo");

      let lastState = null;

      const spritePaths = {
        battery: "/static/sprites/battery.png",
        city: "/static/sprites/city.png",
        cityDestroyed: "/static/sprites/city_destroyed.png",
        cursor: "/static/sprites/cursor.png",
        drone: "/static/sprites/drone.png",
        explosion1: "/static/sprites/explosion_1.png",
        explosion2: "/static/sprites/explosion_2.png",
        explosion3: "/static/sprites/explosion_3.png",
        explosion4: "/static/sprites/explosion_4.png",
        explosion5: "/static/sprites/explosion_5.png",
        ground: "/static/sprites/ground.png",
        missile: "/static/sprites/missile.png",
        moon: "/static/sprites/moon.png",
        tehranFar: "/static/sprites/tehran_far.png",
        tehranNear: "/static/sprites/tehran_near.png",
        star: "/static/sprites/star.png"
      };

      const sprites = {};

      function loadImage(src) {
        return new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => resolve(image);
          image.onerror = reject;
          image.src = src;
        });
      }

      async function loadSprites() {
        const entries = await Promise.all(
          Object.entries(spritePaths).map(async ([key, path]) => [key, await loadImage(path)])
        );
        for (const [key, image] of entries) {
          sprites[key] = image;
        }
      }

      function getCellSize(state) {
        const maxWidth = Math.max(320, window.innerWidth - 72);
        const maxHeight = Math.max(240, window.innerHeight - 220);
        return Math.max(8, Math.floor(Math.min(maxWidth / state.w, maxHeight / state.h)));
      }

      function resizeBoard(state) {
        const cellSize = getCellSize(state);
        board.width = state.w * cellSize;
        board.height = state.h * cellSize;
        board.style.width = `${board.width}px`;
        board.style.height = `${board.height}px`;
        ctx.imageSmoothingEnabled = false;
        return cellSize;
      }

      function drawSprite(sprite, x, y, width, height) {
        if (!sprite) {
          return;
        }
        ctx.drawImage(sprite, Math.round(x), Math.round(y), Math.round(width), Math.round(height));
      }

      function drawBackdrop(state, cellSize) {
        const skyGradient = ctx.createLinearGradient(0, 0, 0, board.height);
        skyGradient.addColorStop(0, "#122548");
        skyGradient.addColorStop(0.5, "#0b1430");
        skyGradient.addColorStop(1, "#050816");
        ctx.fillStyle = skyGradient;
        ctx.fillRect(0, 0, board.width, board.height);

        drawSprite(sprites.moon, board.width * 0.72, board.height * 0.09, cellSize * 2.2, cellSize * 2.2);

        for (let y = 0; y < state.h - 4; y += 1) {
          for (let x = (y % 2) * 5; x < state.w; x += 11) {
            if ((x + y * 3) % 17 === 0) {
              drawSprite(sprites.star, x * cellSize, y * cellSize, cellSize, cellSize);
            }
          }
        }

        const farY = board.height - cellSize * 10;
        const nearY = board.height - cellSize * 9;
        for (let x = -cellSize; x < board.width + cellSize; x += cellSize * 6) {
          drawSprite(sprites.tehranFar, x, farY, cellSize * 6, cellSize * 6);
        }
        for (let x = -cellSize * 0.5; x < board.width + cellSize; x += cellSize * 6) {
          drawSprite(sprites.tehranNear, x, nearY, cellSize * 6, cellSize * 6);
        }

        ctx.fillStyle = "rgba(255, 198, 120, 0.08)";
        ctx.fillRect(0, board.height - cellSize * 6, board.width, cellSize * 2);
      }

      function explosionSpriteForRadius(radius) {
        if (radius <= 1) return sprites.explosion1;
        if (radius === 2) return sprites.explosion2;
        if (radius === 3) return sprites.explosion3;
        if (radius === 4) return sprites.explosion4;
        return sprites.explosion5;
      }

      function draw(state) {
        const cellSize = resizeBoard(state);
        drawBackdrop(state, cellSize);

        for (let x = 0; x < state.w; x += 1) {
          drawSprite(sprites.ground, x * cellSize, (state.h - 1) * cellSize, cellSize, cellSize);
        }

        for (const city of state.cities) {
          const sprite = city.alive ? sprites.city : sprites.cityDestroyed;
          drawSprite(sprite, (city.x - 1) * cellSize, (state.h - 2) * cellSize, cellSize * 3, cellSize * 2);
        }

        drawSprite(
          sprites.battery,
          (state.battery_x - 1) * cellSize,
          (state.battery_y - 1) * cellSize,
          cellSize * 3,
          cellSize * 2
        );

        for (const exp of state.explosions) {
          const size = Math.max(1, exp.r * 2 + 1) * cellSize;
          drawSprite(
            explosionSpriteForRadius(exp.r),
            exp.x * cellSize - size / 2 + cellSize / 2,
            exp.y * cellSize - size / 2 + cellSize / 2,
            size,
            size
          );
        }

        for (const d of state.drones) {
          drawSprite(sprites.drone, Math.round(d.x) * cellSize, Math.round(d.y) * cellSize, cellSize, cellSize);
        }

        for (const m of state.missiles) {
          drawSprite(sprites.missile, Math.round(m.x) * cellSize, Math.round(m.y) * cellSize, cellSize, cellSize);
        }

        drawSprite(sprites.cursor, state.cursor.x * cellSize, state.cursor.y * cellSize, cellSize, cellSize);

        if (state.game_over) {
          const panelWidth = Math.min(board.width * 0.7, cellSize * 28);
          const panelHeight = Math.min(board.height * 0.26, cellSize * 6);
          const panelX = (board.width - panelWidth) / 2;
          const panelY = (board.height - panelHeight) / 2;
          ctx.fillStyle = "rgba(6, 8, 20, 0.85)";
          ctx.fillRect(panelX, panelY, panelWidth, panelHeight);
          ctx.strokeStyle = "#ff5c5c";
          ctx.lineWidth = Math.max(2, Math.floor(cellSize / 5));
          ctx.strokeRect(panelX, panelY, panelWidth, panelHeight);
          ctx.fillStyle = "#ffe5e5";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.font = `${Math.max(16, Math.floor(cellSize * 1.2))}px monospace`;
          ctx.fillText("GAME OVER", board.width / 2, panelY + panelHeight * 0.42);
          ctx.font = `${Math.max(12, Math.floor(cellSize * 0.75))}px monospace`;
          ctx.fillText("Press R to restart", board.width / 2, panelY + panelHeight * 0.72);
        }

        const alive = state.cities.filter((c) => c.alive).length;
        scoreEl.textContent = String(state.score);
        waveEl.textContent = String(state.wave);
        citiesEl.textContent = `${alive}/6`;
        ammoEl.textContent = String(state.ammo);
      }

      async function sendAction(payload) {
        await fetch("/api/action", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
      }

      async function tick() {
        try {
          const resp = await fetch("/api/state", { cache: "no-store" });
          if (!resp.ok) {
            throw new Error("State request failed");
          }
          const state = await resp.json();
          lastState = state;
          draw(state);
          statusEl.textContent = "Online";
        } catch (err) {
          statusEl.textContent = "Disconnected - retrying";
        }
      }

      window.addEventListener("keydown", async (event) => {
        if (!lastState) {
          return;
        }
        if (event.key === "ArrowUp") await sendAction({ action: "move", dx: 0, dy: -1 });
        else if (event.key === "ArrowDown") await sendAction({ action: "move", dx: 0, dy: 1 });
        else if (event.key === "ArrowLeft") await sendAction({ action: "move", dx: -2, dy: 0 });
        else if (event.key === "ArrowRight") await sendAction({ action: "move", dx: 2, dy: 0 });
        else if (event.key === " ") await sendAction({ action: "fire" });
        else if ((event.key === "r" || event.key === "R") && lastState.game_over) {
          await fetch("/api/restart", { method: "POST" });
        } else {
          return;
        }
        event.preventDefault();
        await tick();
      });

      board.addEventListener("click", async (event) => {
        if (!lastState) {
          return;
        }
        const rect = board.getBoundingClientRect();
        const cellW = rect.width / lastState.w;
        const cellH = rect.height / lastState.h;
        const x = Math.max(1, Math.min(lastState.w - 2, Math.floor((event.clientX - rect.left) / cellW)));
        const y = Math.max(1, Math.min(lastState.h - 3, Math.floor((event.clientY - rect.top) / cellH)));
        await sendAction({ action: "click_fire", x, y });
        await tick();
      });

      window.addEventListener("resize", () => {
        if (lastState) {
          draw(lastState);
        }
      });

      async function start() {
        statusEl.textContent = "Loading art...";
        await loadSprites();
        await tick();
        setInterval(tick, 50);
      }

      start().catch(() => {
        statusEl.textContent = "Failed to load art";
      });
    </script>
  </body>
</html>
